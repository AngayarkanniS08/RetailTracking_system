services:
  # -------------------- PostgreSQL Database --------------------
  db:
    image: postgres:15-alpine
    container_name: retail_pos_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: retail_pos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d retail_pos"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # -------------------- Frontend Layout & Static Web --------------------
  app-ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: retail_pos_ui
    ports:
      - "8080:80"
    environment:
      JWT_SECRET: super_secret_key_of_retail_pos_system_2026_jwt_auth
    volumes:
      - ./public:/var/www/html/public
      - ./views:/var/www/html/views:ro
      - ./src:/var/www/html/src:ro
      - ./config:/var/www/html/config:ro
      - ./index.php:/var/www/html/index.php:ro
      - ./.htaccess:/var/www/html/.htaccess:ro
      - ./tmp:/var/www/html/tmp
      # Shadow backend API/Database directories to keep them physically empty
      - /var/www/html/src/Modules/Auth/Controller/Api
      - /var/www/html/src/Modules/Product/Controller/Api
      - /var/www/html/src/Modules/Reports/Controller/Api
      - /var/www/html/Database
    depends_on:
      app-api:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  # -------------------- Backend API & Database Controller --------------------
  app-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: retail_pos_api
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: retail_pos
      DB_USER: admin
      DB_PASSWORD: admin123
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      JWT_SECRET: super_secret_key_of_retail_pos_system_2026_jwt_auth
    volumes:
      - ./src:/var/www/html/src
      - ./Database:/var/www/html/Database
      - ./config:/var/www/html/config
      - ./tmp:/var/www/html/tmp
      - ./src/index.php:/var/www/html/index.php
      - ./src/.htaccess:/var/www/html/.htaccess
      - ./views:/var/www/html/views:ro
      # Keep public directory empty in API container
      - /var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  #............................Valkey Cache Server............................
  valkey:
      image: valkey/valkey:7-alpine
      container_name: retail_valkey
      restart: unless-stopped
      ports:
        - "6379:6379"          # optional: expose to host for debugging
      volumes:
        - valkey-data:/data    # persist cache across restarts (optional)
      command: valkey-server --appendonly yes   # enable persistence
      networks:
        - internal
      healthcheck:
        test: ["CMD", "valkey-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

  # -------------------- Backup Worker --------------------
  backup-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: retail_backup_worker
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: retail_pos
      DB_USER: admin
      DB_PASSWORD: admin123
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_of_retail_pos_system_2026_jwt_auth}
    volumes:
      - ./src:/var/www/html/src
      - ./config:/var/www/html/config
      - ./Database:/var/www/html/Database
      - ./tmp:/var/www/html/tmp
      - ./scripts:/var/www/html/scripts
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # -------------------- Backup Scheduler --------------------
  backup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: retail_backup_scheduler
    command: sh -c "while true; do php /var/www/html/scripts/check_schedule.php; sleep 60; done"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: retail_pos
      DB_USER: admin
      DB_PASSWORD: admin123
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_of_retail_pos_system_2026_jwt_auth}
    volumes:
      - ./src:/var/www/html/src
      - ./config:/var/www/html/config
      - ./Database:/var/www/html/Database
      - ./tmp:/var/www/html/tmp
      - ./scripts:/var/www/html/scripts
    depends_on:
      db:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  valkey-data:

networks:
  internal:
    driver: bridge

