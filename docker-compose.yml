version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: retail_pos_db
    environment:
      POSTGRES_DB: retail_pos
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d retail_pos"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: retail_pos_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=retail_pos
      - DB_USER=admin
      - DB_PASSWORD=admin123
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
