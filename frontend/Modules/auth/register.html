<!DOCTYPE html>
<html lang="en" data-theme-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Pudheera Retail Tracking System</title>
    <meta name="description" content="Create a new account to access the Pudheera Retail Tracking System.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo-area">
            <img src="/assets/images/logo.png" alt="Pudheera Fashions Logo" onerror="this.style.display='none'">
            <div class="auth-logo-text">Pudheera Retail Tracking</div>
        </div>

        <h2 class="auth-title">Create Account</h2>

        <div id="messageBox" class="auth-message"></div>

        <form id="registerForm" novalidate>
            <div class="input-group">
                <label class="input-label" for="username">Username</label>
                <input type="text" id="username" class="input-field" placeholder="Enter username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label class="input-label" for="email">Email</label>
                <input type="email" id="email" class="input-field" placeholder="Enter email" required autocomplete="off">
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <input type="password" id="password" class="input-field" placeholder="Enter password" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm password" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Sign Up</button>
        </form>

        <div class="auth-links">
            <span>Already have an account? <a href="/Modules/auth/login.html">Login here</a></span>
        </div>
    </div>

    <script src="/assets/js/register.js"></script>
</body>
</html>
