<!DOCTYPE html>
<html lang="en" data-theme-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Pudheera Retail Tracking System</title>
    <meta name="description" content="Reset your password for the Pudheera Retail Tracking System.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo-area">
            <img src="/assets/images/logo.png" alt="Pudheera Fashions Logo" onerror="this.style.display='none'">
            <div class="auth-logo-text">Pudheera Retail Tracking</div>
        </div>

        <h2 class="auth-title">Forgot Password</h2>
        <p class="auth-subtitle">Enter your email and we will send you a reset link.</p>

        <div id="messageBox" class="auth-message"></div>

        <form id="forgotForm" novalidate>
            <div class="input-group">
                <label class="input-label" for="email">Email</label>
                <input type="email" id="email" class="input-field" placeholder="Enter your registered email" required autocomplete="email">
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Send Reset Link</button>
        </form>

        <div class="auth-links">
            <span>Remembered your password? <a href="/Modules/auth/login.html">Back to Login</a></span>
        </div>
    </div>

    <script src="/assets/js/forgot-password.js"></script>
</body>
</html>
