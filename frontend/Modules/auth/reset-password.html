<!DOCTYPE html>
<html lang="en" data-theme-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Pudheera Retail Tracking System</title>
    <meta name="description" content="Set a new password for your Pudheera Retail Tracking System account.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo-area">
            <img src="/assets/images/logo.png" alt="Pudheera Fashions Logo" onerror="this.style.display='none'">
            <div class="auth-logo-text">Pudheera Retail Tracking</div>
        </div>

        <h2 class="auth-title">Create New Password</h2>
        <p class="auth-subtitle">Enter your email and your new password below.</p>

        <!-- Shown when the URL has no valid token -->
        <div id="tokenMissingNotice" class="auth-message error" style="display:none;">
            Invalid or missing reset link. Please <a href="/Modules/auth/forgot-password.html">request a new one</a>.
        </div>

        <div id="messageBox" class="auth-message"></div>

        <form id="resetForm" novalidate>
            <!-- Token is populated from URL query string by reset-password.js -->
            <input type="hidden" id="resetToken">

            <div class="input-group">
                <label class="input-label" for="resetEmail">Email</label>
                <input type="email" id="resetEmail" class="input-field" placeholder="Enter your email" required autocomplete="email">
            </div>
            <div class="input-group">
                <label class="input-label" for="resetPassword">New Password</label>
                <input type="password" id="resetPassword" class="input-field" placeholder="Enter new password" required>
            </div>
            <div class="input-group">
                <label class="input-label" for="resetPasswordConfirm">Confirm Password</label>
                <input type="password" id="resetPasswordConfirm" class="input-field" placeholder="Confirm new password" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-primary btn-block">Reset Password</button>
        </form>

        <div class="auth-links">
            <span><a href="/Modules/auth/login.html">← Back to Login</a></span>
        </div>
    </div>

    <script src="/assets/js/reset-password.js"></script>
</body>
</html>
