; docker/php/php.ini
error_reporting = E_ALL
display_errors = Off          ; Off for production, but you can set to On for dev
log_errors = On
error_log = /dev/stderr       ; This sends PHP errors to the container's stderr

; Increased limits for backup operations
max_execution_time = 300
memory_limit = 512M
post_max_size = 256M
upload_max_filesize = 256M